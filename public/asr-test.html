<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小米 ASR 测试工具</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      color: #00d4ff;
      margin-bottom: 30px;
    }
    .upload-area {
      border: 2px dashed #00d4ff;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: rgba(0,212,255,0.05);
      margin-bottom: 20px;
    }
    .upload-area:hover {
      background: rgba(0,212,255,0.1);
      border-color: #00b8e6;
    }
    .upload-area.dragover {
      background: rgba(0,212,255,0.2);
    }
    .upload-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }
    .upload-text {
      color: #aaa;
      margin-bottom: 10px;
    }
    .file-input { display: none; }
    .selected-file {
      margin-top: 15px;
      padding: 10px 20px;
      background: #16213e;
      border-radius: 8px;
      display: none;
    }
    .selected-file.show { display: inline-block; }
    .btn {
      display: inline-block;
      padding: 12px 30px;
      background: #00d4ff;
      color: #1a1a2e;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      transition: all 0.3s;
    }
    .btn:hover { background: #00b8e6; }
    .btn:disabled {
      background: #555;
      cursor: not-allowed;
    }
    .btn.loading::after {
      content: "";
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #1a1a2e;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 8px;
      vertical-align: middle;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .result {
      margin-top: 30px;
      background: #16213e;
      border-radius: 12px;
      padding: 20px;
      display: none;
    }
    .result.show { display: block; }
    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 15px;
      border-bottom: 1px solid #333;
    }
    .status {
      font-size: 20px;
      font-weight: 600;
    }
    .status.success { color: #4ade80; }
    .status.error { color: #f87171; }
    .meta {
      display: flex;
      gap: 20px;
      font-size: 14px;
      color: #888;
    }
    .section {
      margin-top: 20px;
    }
    .section-title {
      color: #00d4ff;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
      text-transform: uppercase;
    }
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }
    .info-item {
      background: #1a1a2e;
      padding: 12px;
      border-radius: 8px;
    }
    .info-label {
      color: #666;
      font-size: 12px;
      margin-bottom: 5px;
    }
    .info-value {
      font-size: 14px;
      word-break: break-all;
    }
    .response-content {
      background: #1a1a2e;
      padding: 15px;
      border-radius: 8px;
      font-family: "Consolas", monospace;
      font-size: 13px;
      max-height: 400px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .error-detail {
      color: #f87171;
    }
    pre { margin: 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>小米 ASR 测试工具</h1>

    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">🎤</div>
      <div class="upload-text">点击或拖拽音频文件到此处</div>
      <div class="upload-text" style="font-size: 12px;">支持: WAV, MP3, M4A, OGG</div>
      <input type="file" class="file-input" id="fileInput" accept=".wav,.mp3,.m4a,.ogg,.amr,.flac">
      <div class="selected-file" id="selectedFile"></div>
    </div>

    <div style="text-align: center;">
      <button class="btn" id="testBtn" disabled>测试 ASR</button>
    </div>

    <div class="result" id="result">
      <div class="result-header">
        <div class="status" id="statusText"></div>
        <div class="meta">
          <span id="responseTime"></span>
          <span id="statusCode"></span>
        </div>
      </div>

      <div class="section">
        <div class="section-title">请求信息</div>
        <div class="info-grid">
          <div class="info-item">
            <div class="info-label">API Key</div>
            <div class="info-value" id="apiKeyStatus"></div>
          </div>
          <div class="info-item">
            <div class="info-label">Base URL</div>
            <div class="info-value" id="baseUrl" style="font-size: 11px; word-break: break-all;"></div>
          </div>
          <div class="info-item">
            <div class="info-label">Model</div>
            <div class="info-value" id="modelName"></div>
          </div>
          <div class="info-item">
            <div class="info-label">文件大小</div>
            <div class="info-value" id="fileSize"></div>
          </div>
          <div class="info-item">
            <div class="info-label">MIME 类型</div>
            <div class="info-value" id="mimeType"></div>
          </div>
          <div class="info-item">
            <div class="info-label">格式转换</div>
            <div class="info-value" id="converted"></div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">请求 Headers</div>
        <div class="response-content" id="requestHeaders"></div>
      </div>

      <div class="section">
        <div class="section-title">API 响应</div>
        <div class="response-content" id="responseContent"></div>
      </div>
    </div>
  </div>

  <script>
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const selectedFile = document.getElementById('selectedFile');
    const testBtn = document.getElementById('testBtn');
    const result = document.getElementById('result');

    let selectedAudioFile = null;

    // 点击上传区域
    uploadArea.addEventListener('click', () => fileInput.click());

    // 拖拽
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });
    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const files = e.dataTransfer.files;
      if (files.length > 0) handleFile(files[0]);
    });

    // 文件选择
    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) handleFile(e.target.files[0]);
    });

    function handleFile(file) {
      selectedAudioFile = file;
      selectedFile.textContent = `已选择: ${file.name} (${formatSize(file.size)})`;
      selectedFile.classList.add('show');
      testBtn.disabled = false;
      result.classList.remove('show');
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    // 测试按钮
    testBtn.addEventListener('click', async () => {
      if (!selectedAudioFile) return;

      testBtn.disabled = true;
      testBtn.classList.add('loading');
      testBtn.textContent = '测试中';
      result.classList.remove('show');

      const formData = new FormData();
      formData.append('audio', selectedAudioFile);

      try {
        const response = await fetch('/api/test/asr', {
          method: 'POST',
          body: formData,
        });
        const data = await response.json();
        displayResult(data);
      } catch (err) {
        displayResult({
          success: false,
          error: err.message,
        });
      } finally {
        testBtn.disabled = false;
        testBtn.classList.remove('loading');
        testBtn.textContent = '测试 ASR';
      }
    });

    function displayResult(data) {
      result.classList.add('show');

      // 状态
      const statusText = document.getElementById('statusText');
      if (data.success) {
        statusText.textContent = '✓ 请求成功';
        statusText.className = 'status success';
      } else {
        statusText.textContent = '✗ 请求失败';
        statusText.className = 'status error';
      }

      document.getElementById('responseTime').textContent = data.responseTime || '';
      document.getElementById('statusCode').textContent = data.status ? `HTTP ${data.status}` : '';

      // 请求信息
      document.getElementById('apiKeyStatus').textContent = data.apiKeyConfigured ? '✓ 已配置' : '✗ 未配置';
      document.getElementById('baseUrl').textContent = data.baseUrl || '';
      document.getElementById('modelName').textContent = data.model || '';
      document.getElementById('fileSize').textContent = data.fileSize ? formatSize(data.fileSize) : '';
      document.getElementById('mimeType').textContent = data.mimeType || '';
      document.getElementById('converted').textContent = data.converted
        ? `✓ 已转 MP3 (${data.conversionInfo?.duration?.toFixed(1) || '?'}s, ${formatSize(data.conversionInfo?.size || 0)})`
        : '—';

      // 请求头
      document.getElementById('requestHeaders').textContent = JSON.stringify(data.requestHeaders || {}, null, 2);

      // 响应内容
      const responseContent = document.getElementById('responseContent');
      if (data.error) {
        responseContent.innerHTML = `<span class="error-detail">错误: ${data.error}</span>`;
        if (data.stack) {
          responseContent.innerHTML += `\n\n堆栈:\n${data.stack}`;
        }
      } else {
        responseContent.textContent = JSON.stringify(data.response || {}, null, 2);
      }
    }
  </script>
</body>
</html>
