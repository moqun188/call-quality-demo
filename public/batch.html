<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>批量质检 — 录音质检系统</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="dashboard.css">
  <style>
    .upload-zone {
      border: 2px dashed #cbd5e1;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
      margin-bottom: 24px;
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: #3b82f6;
      background: #f0f9ff;
    }
    .file-list { margin-bottom: 24px; }
    .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: white;
      border-radius: 8px;
      margin-bottom: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      font-size: 14px;
    }
    .file-item .name { flex: 1; }
    .file-item .status { width: 100px; text-align: center; }
    .file-item .score { width: 60px; text-align: center; font-weight: 600; }
    .status-pending { color: #94a3b8; }
    .status-processing { color: #3b82f6; }
    .status-completed { color: #22c55e; }
    .status-failed { color: #ef4444; }
    .progress-bar {
      width: 100%;
      height: 8px;
      background: #f1f5f9;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .progress-fill {
      height: 100%;
      background: #3b82f6;
      border-radius: 4px;
      transition: width 0.3s;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .summary-card {
      background: white;
      border-radius: 10px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      text-align: center;
    }
    .summary-card .num { font-size: 28px; font-weight: 700; }
    .summary-card .label { font-size: 13px; color: #64748b; margin-top: 4px; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 20px; font-size: 14px; color: #3b82f6; text-decoration: none; }
    .back-link:hover { text-decoration: underline; }
    .rule-selector { margin-bottom: 20px; }
    .rule-selector select { padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← 返回首页</a>
    <h1>批量质检</h1>
    <p style="color:#64748b; margin-bottom:24px;">支持同时上传多个录音文件，逐个自动质检</p>

    <div class="rule-selector">
      <label>质检规则：</label>
      <select id="ruleSelect"></select>
    </div>

    <div class="upload-zone" id="uploadZone">
      <div style="font-size:48px; margin-bottom:12px;">📁</div>
      <p style="font-size:16px; font-weight:600;">拖拽文件到此处，或点击选择</p>
      <p style="color:#94a3b8; font-size:13px;">支持 WAV/MP3/M4A/OGG/AMR/FLAC，最多 20 个文件</p>
      <input type="file" id="fileInput" accept=".wav,.mp3,.m4a,.ogg,.amr,.flac" multiple hidden>
    </div>

    <div id="fileList" class="file-list" hidden></div>
    <button class="btn btn-primary" id="startBtn" hidden>开始批量质检</button>

    <div id="progress" hidden>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div id="summary" class="summary-grid"></div>
      <div id="resultList" class="file-list"></div>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById("fileInput");
    const uploadZone = document.getElementById("uploadZone");
    const fileList = document.getElementById("fileList");
    const startBtn = document.getElementById("startBtn");
    const progressDiv = document.getElementById("progress");
    const progressFill = document.getElementById("progressFill");
    const summaryDiv = document.getElementById("summary");
    const resultList = document.getElementById("resultList");
    const ruleSelect = document.getElementById("ruleSelect");

    let selectedFiles = [];

    // Load rules
    fetch("/api/rules").then(r => r.json()).then(d => {
      ruleSelect.innerHTML = (d.data || []).map(r =>
        `<option value="${r.name}">${r.label} (${r.version})</option>`
      ).join("");
    });

    uploadZone.addEventListener("click", () => fileInput.click());
    uploadZone.addEventListener("dragover", (e) => { e.preventDefault(); uploadZone.classList.add("dragover"); });
    uploadZone.addEventListener("dragleave", () => uploadZone.classList.remove("dragover"));
    uploadZone.addEventListener("drop", (e) => {
      e.preventDefault();
      uploadZone.classList.remove("dragover");
      handleFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener("change", () => handleFiles(fileInput.files));

    function handleFiles(files) {
      selectedFiles = [...files];
      fileList.hidden = selectedFiles.length === 0;
      startBtn.hidden = selectedFiles.length === 0;
      fileList.innerHTML = selectedFiles.map((f, i) =>
        `<div class="file-item"><span class="name">${f.name}</span><span class="status status-pending">待处理</span></div>`
      ).join("");
    }

    startBtn.addEventListener("click", async () => {
      if (selectedFiles.length === 0) return;
      startBtn.disabled = true;
      startBtn.textContent = "上传中...";
      progressDiv.hidden = false;

      const formData = new FormData();
      selectedFiles.forEach(f => formData.append("audio", f));
      formData.append("ruleName", ruleSelect.value);

      try {
        const res = await fetch("/api/batch/inspect", { method: "POST", body: formData });
        const json = await res.json();
        if (!json.success) throw new Error(json.error);

        const batchId = json.data.batchId;
        pollBatch(batchId);
      } catch (err) {
        alert("上传失败: " + err.message);
        startBtn.disabled = false;
        startBtn.textContent = "开始批量质检";
      }
    });

    function pollBatch(batchId) {
      const interval = setInterval(async () => {
        try {
          const res = await fetch(`/api/batch/${batchId}`);
          const json = await res.json();
          const job = json.data;

          const done = job.completed + job.failed;
          const pct = Math.round(done / job.total * 100);
          progressFill.style.width = pct + "%";

          summaryDiv.innerHTML = `
            <div class="summary-card"><div class="num">${job.total}</div><div class="label">总计</div></div>
            <div class="summary-card"><div class="num" style="color:#22c55e">${job.completed}</div><div class="label">完成</div></div>
            <div class="summary-card"><div class="num" style="color:#ef4444">${job.failed}</div><div class="label">失败</div></div>
            <div class="summary-card"><div class="num">${pct}%</div><div class="label">进度</div></div>
          `;

          resultList.innerHTML = job.items.map(item => {
            const statusClass = `status-${item.status}`;
            const statusText = { pending: "待处理", processing: "处理中", completed: "完成", failed: "失败" }[item.status];
            const score = item.result ? `${item.result.totalScore} (${item.result.level})` : item.status === "failed" ? item.error : "";
            return `<div class="file-item">
              <span class="name">${item.fileName}</span>
              <span class="status ${statusClass}">${statusText}</span>
              <span class="score">${score}</span>
            </div>`;
          }).join("");

          if (job.status === "completed" || job.status === "failed") {
            clearInterval(interval);
            startBtn.textContent = "重新选择文件";
            startBtn.disabled = false;
            startBtn.onclick = () => {
              selectedFiles = [];
              fileList.hidden = true;
              startBtn.hidden = true;
              progressDiv.hidden = true;
              fileInput.value = "";
              startBtn.textContent = "开始批量质检";
              startBtn.onclick = null;
            };
          }
        } catch (err) {
          clearInterval(interval);
          alert("查询状态失败: " + err.message);
        }
      }, 2000);
    }
  </script>
</body>
</html>
