<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自我进化 — 录音质检系统</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="dashboard.css">
  <style>
    .insight-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      border-left: 4px solid #e2e8f0;
    }
    .insight-card.critical { border-left-color: #dc2626; }
    .insight-card.high { border-left-color: #ea580c; }
    .insight-card.medium { border-left-color: #ca8a04; }
    .insight-card.low { border-left-color: #3b82f6; }
    .insight-card.info { border-left-color: #22c55e; }
    .insight-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .priority-badge {
      font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px;
    }
    .priority-critical { background: #fee2e2; color: #dc2626; }
    .priority-high { background: #ffedd5; color: #ea580c; }
    .priority-medium { background: #fef9c3; color: #ca8a04; }
    .priority-low { background: #dbeafe; color: #1d4ed8; }
    .priority-info { background: #dcfce7; color: #166534; }
    .category-label { font-size: 13px; color: #64748b; }
    .insight-message { font-size: 15px; color: #1e293b; margin-bottom: 8px; }
    .insight-action { font-size: 13px; color: #3b82f6; background: #f0f9ff; padding: 8px 12px; border-radius: 6px; }
    .trend-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .trend-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .trend-card .label { font-size: 13px; color: #64748b; margin-bottom: 4px; }
    .trend-card .value { font-size: 28px; font-weight: 700; color: #1e293b; }
    .trend-card .sub { font-size: 12px; color: #94a3b8; margin-top: 4px; }
    .dim-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .dim-bar .dim-name { width: 80px; font-size: 13px; color: #475569; }
    .dim-bar .bar-bg { flex: 1; height: 20px; background: #f1f5f9; border-radius: 10px; overflow: hidden; }
    .dim-bar .bar-fill { height: 100%; border-radius: 10px; transition: width 0.6s ease; }
    .dim-bar .dim-score { width: 40px; text-align: right; font-size: 13px; font-weight: 600; }
    .rule-hit { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
    .rule-hit:last-child { border-bottom: none; }
    .hit-count { font-weight: 600; }
    .section-title { font-size: 18px; font-weight: 700; color: #1e293b; margin: 24px 0 12px; display: flex; align-items: center; gap: 8px; }
    .loading { text-align: center; padding: 60px; color: #94a3b8; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 20px; font-size: 14px; color: #3b82f6; text-decoration: none; }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← 返回首页</a>
    <h1>🧬 自我进化</h1>
    <p style="color:#64748b; margin-bottom:24px;">基于历史质检数据，自动分析趋势、发现规则盲区、生成优化建议</p>

    <div id="content"><div class="loading">加载中...</div></div>
  </div>

  <script>
    const dimNames = { compliance: "话术合规", knowledge: "业务知识", process: "流程完整", communication: "沟通技巧" };
    const dimColors = { compliance: "#3b82f6", knowledge: "#8b5cf6", process: "#f59e0b", communication: "#10b981" };
    const priorityLabels = { critical: "紧急", high: "高", medium: "中", low: "低", info: "信息" };

    async function load() {
      try {
        const res = await fetch("/api/evolution");
        const json = await res.json();
        if (!json.success) throw new Error(json.error);
        render(json.data);
      } catch (err) {
        document.getElementById("content").innerHTML = `<div class="loading">加载失败: ${err.message}</div>`;
      }
    }

    function render(data) {
      const t = data.trends;
      let html = "";

      // 趋势概览
      if (t.hasEnoughData) {
        html += `<div class="section-title">趋势概览</div>`;
        html += `<div class="trend-grid">
          <div class="trend-card">
            <div class="label">总质检数</div>
            <div class="value">${t.totalRecords}</div>
          </div>
          <div class="trend-card">
            <div class="label">平均分</div>
            <div class="value">${t.avgScore}</div>
          </div>
          <div class="trend-card">
            <div class="label">近期均分</div>
            <div class="value">${t.recentAvg}</div>
            <div class="sub">最近 5 条</div>
          </div>
          <div class="trend-card">
            <div class="label">趋势</div>
            <div class="value">${t.trend.icon} ${t.trend.direction}</div>
            <div class="sub">${t.trend.desc}</div>
          </div>
        </div>`;

        // 维度雷达
        html += `<div class="section-title">维度分析</div>`;
        html += `<div style="background:white;border-radius:12px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,0.06);margin-bottom:24px;">`;
        for (const [k, v] of Object.entries(t.dimensionAverages)) {
          const pct = Math.round(v * 10);
          const color = dimColors[k] || "#3b82f6";
          html += `<div class="dim-bar">
            <span class="dim-name">${dimNames[k] || k}</span>
            <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
            <span class="dim-score">${v}</span>
          </div>`;
        }
        html += `</div>`;

        // 等级分布
        html += `<div class="section-title">等级分布</div>`;
        html += `<div style="background:white;border-radius:12px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,0.06);margin-bottom:24px;">`;
        const levelColors = { A: "#22c55e", B: "#3b82f6", C: "#f59e0b", D: "#f97316", E: "#ef4444" };
        for (const lv of ["A", "B", "C", "D", "E"]) {
          const count = t.levelDistribution[lv] || 0;
          const pct = Math.round(count / t.totalRecords * 100);
          html += `<div class="dim-bar">
            <span class="dim-name">${lv} 级</span>
            <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${levelColors[lv]}"></div></div>
            <span class="dim-score">${count}</span>
          </div>`;
        }
        html += `</div>`;
      } else {
        html += `<div class="trend-card" style="text-align:center;padding:40px;">
          <div class="value">📊</div>
          <div class="label" style="margin-top:8px;">${t.message || "数据不足"}</div>
          <div class="sub">质检更多录音后，系统将自动分析趋势</div>
        </div>`;
      }

      // 进化洞察
      html += `<div class="section-title">进化洞察</div>`;
      if (data.insights.length === 0) {
        html += `<div class="insight-card info"><div class="insight-message">暂无洞察</div></div>`;
      }
      for (const ins of data.insights) {
        html += `<div class="insight-card ${ins.priority}">
          <div class="insight-header">
            <span class="priority-badge priority-${ins.priority}">${priorityLabels[ins.priority] || ins.priority}</span>
            <span class="category-label">${ins.category}</span>
          </div>
          <div class="insight-message">${ins.message}</div>
          <div class="insight-action">${ins.action}</div>
        </div>`;
      }

      // 规则有效性
      const eff = data.ruleEffectiveness;
      html += `<div class="section-title">规则有效性</div>`;
      html += `<div style="background:white;border-radius:12px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,0.06);margin-bottom:24px;">`;
      for (const [word, count] of Object.entries(eff.prohibitedWordHits)) {
        html += `<div class="rule-hit">
          <span>${word}</span>
          <span class="hit-count" style="color:${count > 0 ? '#ef4444' : '#94a3b8'}">${count > 0 ? `命中 ${count} 次` : '未触发'}</span>
        </div>`;
      }
      html += `</div>`;
      html += `<div style="font-size:13px;color:#64748b;margin-bottom:24px;">${eff.suggestion}</div>`;

      // 盲区发现
      if (data.blindSpots.length > 0) {
        html += `<div class="section-title">规则盲区</div>`;
        html += `<div style="background:white;border-radius:12px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,0.06);margin-bottom:24px;">`;
        for (const b of data.blindSpots) {
          html += `<div class="rule-hit">
            <span>"${b.word}" — 出现 ${b.count} 次</span>
            <span style="color:#3b82f6;font-size:13px">${b.suggestion}</span>
          </div>`;
        }
        html += `</div>`;
      }

      html += `<div style="text-align:center;color:#94a3b8;font-size:12px;margin-top:32px;padding-bottom:40px;">分析时间: ${new Date(data.generatedAt).toLocaleString("zh-CN")}</div>`;

      document.getElementById("content").innerHTML = html;
    }

    load();
  </script>
</body>
</html>
